<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Customer management — VoltGrid</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/components.css" />
</head>
<body>

  <header class="topbar">
    <div class="brand"><span class="bolt">⚡</span><span>VoltGrid<small>Admin</small></span></div>
    <nav>
      <a href="dashboard.html">Dashboard</a>
      <a href="policyManagement.html">Policies</a>
      <a href="customerManagement.html" class="active">Customers</a>
      <a href="employeeManagement.html">Employees</a>
      <a href="complaintManagement.html">Complaints</a>
    </nav>
    <div class="flex">
      <div class="who"><strong id="whoName"></strong><span>Administrator</span></div>
      <button id="logoutBtn" class="btn btn-ghost btn-sm">Log out</button>
    </div>
  </header>

  <main class="page">
    <p class="eyebrow">People</p>
    <h1>Customer management</h1>
    <p class="muted mb-2">Every registered connection on the grid.</p>

    <div class="glass mb-2">
      <div class="field" style="max-width:360px; margin-bottom:0;">
        <label for="search">Search customers</label>
        <input id="search" type="text" placeholder="Name, email or meter number…" />
      </div>
    </div>

    <div class="glass">
      <div class="table-wrap">
        <table class="glass-table">
          <thead><tr><th>ID</th><th>Name</th><th>Email</th><th>Phone</th><th>Meter no.</th><th>Address</th><th></th></tr></thead>
          <tbody id="customerRows"></tbody>
        </table>
      </div>
    </div>
  </main>

  <script src="../js/data.js"></script>
  <script src="../js/admin/customerManagement.js"></script>
</body>
</html>
