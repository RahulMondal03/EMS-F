<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Customer lookup — Volt Connect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <script src="../js/theme.js"></script>
</head>
<body>

  <div id="appbar" data-role="employee"></div>

  <main class="page" style="max-width:860px;">
    <p class="eyebrow">Directory</p>
    <h1>Customer lookup</h1>

    <div class="glass mb-2">
      <div class="field" style="margin-bottom:0;">
        <label for="search">Search</label>
        <input id="search" type="text" placeholder="e.g. MTR-58291 or anita@example.com" />
      </div>
    </div>

    <div id="results" class="grid"></div>
  </main>

  <script src="../js/data.js"></script>
  <script src="../js/appbar.js"></script>
  <script src="../js/employee/customerLookup.js"></script>
</body>
</html>
